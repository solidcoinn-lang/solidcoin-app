<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SolidCoin - Login e Cadastro</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-container { background-color: #1a1a1a; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); border: 1px solid rgba(212, 175, 55, 0.2); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #d4af37; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background-color: #0a0a0a; color: #fff; box-sizing: border-box; }
        input:focus { border-color: #d4af37; outline: none; }
        button { width: 100%; padding: 12px; background-color: #d4af37; color: #000; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; font-size: 1.1em; transition: 0.3s; }
        button:hover { background-color: #b5952f; }
        .toggle-btn { background: none; color: #aaa; font-weight: normal; margin-top: 15px; font-size: 0.9em; text-decoration: underline; }
        .toggle-btn:hover { background: none; color: #fff; }
    </style>
</head>
<body>

    <div class="auth-container" id="login-box">
        <h1>Entrar na SolidCoin</h1>
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Seu E-mail" required>
            <input type="password" name="senha" placeholder="Sua Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <button class="toggle-btn" onclick="toggleAuth('register')">Ainda não tem conta? Cadastre-se</button>
    </div>

    <div class="auth-container" id="register-box" style="display: none;">
        <h1>Criar Conta</h1>
        <form action="/cadastrar" method="POST">
            <input type="text" name="nome" placeholder="Seu Nome Completo" required>
            <input type="email" name="email" placeholder="Seu E-mail" required>
            <input type="password" name="senha" placeholder="Crie uma Senha" required>
            
            <!-- NOVO CAMPO: CÓDIGO DE INDICAÇÃO -->
            <input type="text" name="codigoIndicacao" placeholder="Código de Indicação (Opcional)" style="border: 1px dashed #d4af37; text-transform: uppercase;">
            <p style="font-size: 0.8em; color: #aaa; margin-top: -5px; text-align: left;">Tem um convite? Ganhe 250 SC ao usar o código de um amigo!</p>

            <button type="submit">Cadastrar</button>
        </form>
        <button class="toggle-btn" onclick="toggleAuth('login')">Já tem conta? Faça Login</button>
    </div>

    <script>
        function toggleAuth(type) {
            document.getElementById('login-box').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register-box').style.display = type === 'register' ? 'block' : 'none';
        }
        
        // Verifica se a URL tem ?cadastro=sucesso
        if (window.location.search.includes('cadastro=sucesso')) {
            alert('Cadastro realizado com sucesso! Ganhou bônus? Verifique seu extrato ao fazer login.');
            toggleAuth('login');
        }
    </script>
</body>
</html>

<!-- --- GIFT CARDS E RECARGAS --- -->
        <div class="card-group">
            <div class="card">
                <h2>Comprar Gift Card</h2>
                <p style="font-size: 0.9em; color: #555;">500 SC = R$ 1,00. O PIN chegará no seu extrato.</p>
                <form id="giftcard-form">
                    <select id="gift-tipo" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 4px;">
                        <option value="Google Play">Google Play (Mín. R$ 15)</option>
                        <option value="Shopee">Shopee (Mín. R$ 30)</option>
                    </select>
                    <input type="number" id="gift-valor" placeholder="Valor em R$ (Ex: 30)" min="15" max="300" step="1" required>
                    <p style="font-size: 0.9em; font-weight: bold;">Custo: <span id="gift-custo">0</span> SC</p>
                    <button type="submit">Comprar Gift Card</button>
                </form>
            </div>

            <div class="card">
                <h2>Recarga de Celular</h2>
                <p style="font-size: 0.9em; color: #555;">500 SC = R$ 1,00. O comprovante (NSU) irá para o extrato.</p>
                <form id="recharge-form">
                    <select id="recharge-operadora" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 4px;">
                        <option value="Claro">Claro</option>
                        <option value="Vivo">Vivo</option>
                        <option value="Tim">Tim</option>
                    </select>
                    <select id="recharge-valor" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 4px;">
                        <!-- Valores injetados pelo JS -->
                    </select>
                    <input type="text" id="recharge-celular" placeholder="Número (Ex: 11999999999)" required>
                    <p style="font-size: 0.9em; font-weight: bold;">Custo: <span id="recharge-custo">0</span> SC</p>
                    <button type="submit" style="background-color: #27ae60;">Fazer Recarga</button>
                </form>
            </div>
        </div>
